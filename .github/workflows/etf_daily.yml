name: ETF Daily Rotation

on:
  schedule:
    - cron: '33 8 * * 1-5'   # 北京时间 16:33 (UTC 08:33, 避开整点高峰)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run ETF Rotator
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python etf_rotation_cloud.py --feishu

      - name: Upload log on failure
        if: failure()
        run: |
          echo "::error::ETF rotation failed, check workflow log"
          exit 1
